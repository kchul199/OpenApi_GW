apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-upstream
  namespace: oag-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-upstream
  template:
    metadata:
      labels:
        app: mock-upstream
    spec:
      containers:
        - name: mock-upstream
          image: gcr.io/google-containers/echoserver:1.4
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8000"
---
apiVersion: v1
kind: Service
metadata:
  name: mock-upstream
  namespace: oag-system
spec:
  selector:
    app: mock-upstream
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
