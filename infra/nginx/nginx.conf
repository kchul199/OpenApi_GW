# =============================================================================
# 코인 자동 매매 시스템 - Nginx 리버스 프록시 설정
# =============================================================================
# 라우팅 규칙:
#   /api/   → upstream backend:8000  (FastAPI REST)
#   /ws     → upstream backend:8000  (WebSocket)
#   /       → upstream frontend:3000 (Next.js)
#
# 적용 방법 (docker compose):
#   volumes:
#     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
# =============================================================================

# worker 프로세스 수 (auto = CPU 코어 수)
worker_processes auto;

# 파일 디스크립터 최대 개수 (ulimit -n 값 이하로 설정)
worker_rlimit_nofile 65535;

events {
    # worker당 최대 동시 연결 수
    worker_connections 4096;
    # epoll(Linux) 사용으로 I/O 성능 향상
    use epoll;
    # 가능하면 한 번에 여러 연결 수락
    multi_accept on;
}

http {
    # MIME 타입 매핑
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # 로그 포맷 (JSON 형식 - 로그 집계 시스템 연동 용이)
    # -------------------------------------------------------------------------
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log  warn;

    # -------------------------------------------------------------------------
    # 성능 최적화
    # -------------------------------------------------------------------------
    # 커널 수준 파일 전송 (정적 파일에 효과적)
    sendfile    on;
    # TCP 패킷 최적화 (헤더+본문 합쳐서 전송)
    tcp_nopush  on;
    tcp_nodelay on;
    # Keep-Alive 타임아웃 (초)
    keepalive_timeout 65;

    # -------------------------------------------------------------------------
    # 응답 압축 (Gzip)
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # -------------------------------------------------------------------------
    # 보안 헤더
    # -------------------------------------------------------------------------
    # 서버 버전 정보 노출 방지
    server_tokens off;

    # -------------------------------------------------------------------------
    # 업스트림: FastAPI Backend
    # -------------------------------------------------------------------------
    upstream backend {
        # Docker 내부 DNS로 해석됨 (docker-compose 서비스명)
        server backend:8000;
        # 헬스체크 실패 시 일시 제외 (max_fails * fail_timeout)
        # keepalive: 업스트림 연결 풀 유지
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # 업스트림: Next.js Frontend
    # -------------------------------------------------------------------------
    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # =========================================================================
    # HTTP 서버 (포트 80)
    # =========================================================================
    server {
        listen 80;
        # 운영 환경에서는 실제 도메인으로 교체
        server_name _;

        # 클라이언트 최대 요청 바디 크기
        client_max_body_size 10M;

        # 프록시 공통 타임아웃
        proxy_connect_timeout   60s;
        proxy_send_timeout      60s;
        proxy_read_timeout      60s;

        # X-Forwarded-* 헤더 설정 (실제 클라이언트 IP 전달)
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # HTTP/1.1 Keep-Alive 유지 (업스트림 연결 재사용)
        proxy_http_version 1.1;

        # -----------------------------------------------------------------------
        # 운영 환경 HTTPS 리다이렉트 (주석 해제 후 사용)
        # -----------------------------------------------------------------------
        # return 301 https://$host$request_uri;

        # -----------------------------------------------------------------------
        # /api/ → FastAPI Backend (REST API)
        # -----------------------------------------------------------------------
        location /api/ {
            proxy_pass http://backend;

            # 캐시 비활성화 (API 응답은 동적)
            proxy_no_cache 1;
            proxy_cache_bypass 1;

            # CORS preflight 처리 (개발 편의)
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  "*";
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
                add_header Access-Control-Max-Age       86400;
                return 204;
            }
        }

        # -----------------------------------------------------------------------
        # /ws → FastAPI Backend (WebSocket)
        # WebSocket 업그레이드 처리 필수
        # -----------------------------------------------------------------------
        location /ws {
            proxy_pass http://backend;

            # WebSocket 핸드셰이크를 위한 업그레이드 헤더
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # WebSocket은 타임아웃을 길게 설정 (실시간 데이터 스트림)
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;

            # 연결 버퍼링 비활성화 (실시간 메시지 즉시 전달)
            proxy_buffering off;
        }

        # -----------------------------------------------------------------------
        # / → Next.js Frontend
        # -----------------------------------------------------------------------
        location / {
            proxy_pass http://frontend;

            # Next.js HMR(Hot Module Replacement) WebSocket 지원
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 정적 자산 캐싱 (Next.js /_next/static/)
            location ~* ^/_next/static/ {
                proxy_pass http://frontend;
                # 1년 캐시 (파일명에 해시 포함되므로 안전)
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # -----------------------------------------------------------------------
        # 헬스체크 엔드포인트 (로드밸런서 / K8s probe 용)
        # -----------------------------------------------------------------------
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # -----------------------------------------------------------------------
        # Prometheus 메트릭 엔드포인트 (내부망에서만 접근 허용)
        # -----------------------------------------------------------------------
        location /nginx_status {
            stub_status on;
            access_log off;
            # 내부 Docker 네트워크 IP 대역만 허용
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
        }
    }

    # =========================================================================
    # HTTPS 서버 (포트 443) - 운영 환경에서 주석 해제
    # Let's Encrypt 인증서 경로는 실제 도메인에 맞게 수정
    # =========================================================================
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #
    #     # 권장 SSL 파라미터
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #
    #     # HSTS (1년, includeSubDomains)
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # 나머지 location 블록은 HTTP 서버와 동일하게 적용
    #     # ... (위의 location 블록을 복사하여 사용)
    # }
}
