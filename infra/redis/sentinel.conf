# =============================================================================
# Redis Sentinel 설정
# =============================================================================
# docker-compose.yml에서 /sentinel-template.conf 로 마운트됩니다.
# 컨테이너 시작 스크립트가 이 파일을 /sentinel.conf 로 복사한 뒤
# auth-pass 라인을 추가하고 redis-sentinel 을 실행합니다.
#
# Sentinel HA 구성:
#   - 모니터링 대상: redis-master:6379 (mymaster)
#   - quorum: 2  (sentinel 3개 중 2개 동의 시 failover 개시)
# =============================================================================

# 모니터링할 master 설정
# 형식: sentinel monitor <master-name> <host> <port> <quorum>
sentinel monitor mymaster redis-master 6379 2

# Master가 응답 없을 때 주관적 다운(SDOWN) 판정까지 대기 시간 (ms)
# 네트워크 지연을 고려해 5000ms(5초) 권장
sentinel down-after-milliseconds mymaster 5000

# Failover 전체 과정의 최대 허용 시간 (ms)
# 이 시간 초과 시 Sentinel이 다른 Sentinel에게 failover를 위임
sentinel failover-timeout mymaster 60000

# Failover 후 새 master로 동기화할 replica의 동시 개수
# 1 = 순차 동기화 (트래픽 영향 최소화)
sentinel parallel-syncs mymaster 1

# Sentinel 리스닝 포트 (기본: 26379)
port 26379
